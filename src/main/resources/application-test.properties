# Test-specific database configuration using H2 (in-memory)
spring.datasource.url=jdbc:h2:mem:golf_club_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate Configuration for Test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console for testing
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
