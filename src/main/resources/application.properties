# Spring application name
spring.application.name=GOLF-CLUB-MANAGEMENT

# MySQL Database Configuration (for production)
spring.datasource.url=jdbc:mysql://localhost:3306/golf_club
spring.datasource.username=root
spring.datasource.password=Keyin2021
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# H2 Console Configuration (optional for viewing)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdb

# Server Configuration
server.port=8080
# Set the profile for testing (or production)
spring.profiles.active=prod
